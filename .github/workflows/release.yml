name: release

# Every push to main auto-bumps the patch version (+0.0.1), commits the bumped
# Cargo.toml back, then builds the binaries from it and replaces the rolling
# `latest` release. Bump minor/major by hand in Cargo.toml for big updates —
# patch is automatic. The bump commit is pushed with GITHUB_TOKEN, which does
# NOT re-trigger workflows, so there is no infinite loop.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bump:
    name: bump patch version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
      - name: bump patch in Cargo.toml
        id: bump
        run: |
          cur=$(grep -m1 '^version = ' Cargo.toml | sed -E 's/version = "(.*)"/\1/')
          IFS=. read -r MA MI PA <<< "$cur"
          new="$MA.$MI.$((PA + 1))"
          # Replace only the first (package) version line — dep versions are not at column 0.
          sed -i -E "0,/^version = .*/s//version = \"$new\"/" Cargo.toml
          echo "version=$new" >> "$GITHUB_OUTPUT"
          echo "bumped $cur -> $new"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "release: v$new [skip ci]"
          git push origin main

  build:
    name: build ${{ matrix.asset }}
    needs: bump
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: aello-x86_64-linux
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: aello-x86_64-windows.exe
    steps:
      # Check out main HEAD (the bump commit) so the binary reports the new version.
      - uses: actions/checkout@v5
        with:
          ref: main
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --target ${{ matrix.target }}
      - name: stage binary
        shell: bash
        run: |
          src="target/${{ matrix.target }}/release/aello"
          [ -f "$src.exe" ] && src="$src.exe"
          cp "$src" "${{ matrix.asset }}"
      - uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    name: publish latest
    needs: [bump, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true
      - name: publish rolling latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          VERSION: ${{ needs.bump.outputs.version }}
        run: |
          notes="aello v$VERSION — build ${{ github.sha }}"
          # Keep ONE permanent published release tagged `latest`; never delete it
          # (delete+recreate intermittently produced a draft → 404 on update).
          # Just clobber its assets and refresh title/notes each build.
          if gh release view latest >/dev/null 2>&1; then
            gh release upload latest dist/* --clobber
            gh release edit latest --title "v$VERSION" --notes "$notes" --draft=false --latest
          else
            gh release create latest dist/* --title "v$VERSION" --notes "$notes" --latest
          fi
