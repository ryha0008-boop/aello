name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for filing a bug! Please fill out the sections below so we can reproduce it.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The exact commands you ran (e.g. `aello add ...`, `aello run ...`).
      placeholder: |
        1. aello add ...
        2. aello run ...
        3. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: aello version
      description: Output of `aello --version`.
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - Linux
        - Windows
        - macOS (from source)
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant output or logs
      render: shell
